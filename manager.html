<!DOCTYPE html>
<html lang="vi">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAKO_BIZ — Product Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-0:#09090b;--bg-1:#0c0c0f;--bg-2:#16161a;--bg-3:#1e1e24;--bg-4:#27272e;
  --border:#2a2a32;--border-h:#3a3a44;
  --text:#fafafa;--text-2:#a1a1aa;--text-3:#71717a;
  --accent:#818cf8;--accent-bg:rgba(129,140,248,.1);--accent-border:rgba(129,140,248,.25);
  --green:#4ade80;--green-bg:rgba(74,222,128,.1);--green-border:rgba(74,222,128,.25);
  --red:#f87171;--red-bg:rgba(248,113,113,.08);--red-border:rgba(248,113,113,.2);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,.1);--yellow-border:rgba(251,191,36,.25);
  --r:10px;--r2:8px;--shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --transition:150ms cubic-bezier(.4,0,.2,1);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-0);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

/* ── NAV ─────────────────────────────────────── */
.nav{height:48px;background:var(--bg-1);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-logo{font-size:13px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:6px}
.nav-logo .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.nav-sep{color:var(--text-3);font-weight:300}
.nav-page{font-size:13px;color:var(--text-2);font-weight:500}
.nav-right{display:flex;align-items:center;gap:6px}
.nav-status{font-size:11px;color:var(--text-3);margin-right:8px;font-weight:500}

/* ── BUTTONS ─────────────────────────────────── */
.btn{padding:6px 14px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg-3);color:var(--text);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all var(--transition);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--bg-4);border-color:var(--border-h)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#111}.btn-accent:hover{opacity:.9;transform:translateY(-1px)}
.btn-green{background:var(--green);border-color:var(--green);color:#111}.btn-green:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-2)}.btn-ghost:hover{background:var(--bg-3);color:var(--text)}
.btn-red{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}.btn-red:hover{background:rgba(248,113,113,.15)}
.btn-sm{padding:4px 10px;font-size:11px}

/* ── LAYOUT ──────────────────────────────────── */
.layout{display:flex;height:calc(100vh - 48px)}
.sidebar{width:280px;background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg-0)}

/* ── SIDEBAR ─────────────────────────────────── */
.sb-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sb-title{font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em}
.sb-list{flex:1;overflow-y:auto;padding:6px}
.pi{padding:10px 12px;border-radius:var(--r2);cursor:pointer;transition:all var(--transition);display:flex;gap:10px;align-items:center;margin-bottom:2px}
.pi:hover{background:var(--bg-2)}
.pi.active{background:var(--accent-bg);border:1px solid var(--accent-border)}
.pi-icon{width:36px;height:36px;border-radius:var(--r2);background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1px solid var(--border);overflow:hidden}
.pi-icon img{width:100%;height:100%;object-fit:cover}
.pi-info{flex:1;min-width:0}
.pi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-sub{font-size:11px;color:var(--text-3);margin-top:1px;display:flex;gap:6px;align-items:center}
.dot-status{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-active{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-coming{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.dot-hidden{background:var(--text-3)}

/* ── CARDS ────────────────────────────────────── */
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;transition:border-color var(--transition)}
.card:hover{border-color:var(--border-h)}
.card-title{font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:14px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.04em}
.card-title .ct-icon{font-size:14px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-head h2{font-size:18px;font-weight:800;letter-spacing:-.02em}
.section-head .meta{font-size:12px;color:var(--text-3)}

/* ── FORMS ────────────────────────────────────── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em}
input,select,textarea{padding:8px 12px;border-radius:var(--r2);background:var(--bg-1);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:all var(--transition);width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
input::placeholder{color:var(--text-3)}
textarea{resize:vertical;min-height:64px}
select{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2371717a' fill='none' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}
select option{background:var(--bg-2);color:var(--text)}

/* ── TABS ─────────────────────────────────────── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all var(--transition);letter-spacing:.01em}
.tab:hover{color:var(--text-2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;animation:fadeIn .2s}.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── STATUS BADGES ───────────────────────────── */
.badge{padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
.badge-active{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-coming{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.badge-hidden{background:var(--bg-3);color:var(--text-3);border:1px solid var(--border)}

/* ── IMAGE PREVIEW ───────────────────────────── */
.img-zone{width:100%;max-width:360px;aspect-ratio:16/9;border-radius:var(--r);border:1px dashed var(--border);background:var(--bg-1);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;transition:all var(--transition)}
.img-zone:hover{border-color:var(--accent);background:var(--accent-bg)}
.img-zone img{width:100%;height:100%;object-fit:cover}
.img-zone .ph{text-align:center;color:var(--text-3);font-size:12px;line-height:1.8}
.img-zone .ph .up-icon{font-size:24px;display:block;margin-bottom:4px;opacity:.5}
.img-rm{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.7);color:var(--red);border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}

/* ── DYNAMIC ROWS ────────────────────────────── */
.dyn-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;animation:fadeIn .15s}
.dyn-row input{flex:1}
.rm-btn{width:26px;height:26px;border-radius:var(--r2);background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--transition)}
.rm-btn:hover{background:rgba(248,113,113,.2)}
.add-btn{padding:5px 12px;border-radius:var(--r2);background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:all var(--transition);margin-top:4px}
.add-btn:hover{background:rgba(129,140,248,.18)}

/* ── GUIDE GALLERY ───────────────────────────── */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:10px}
.gallery-item{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;position:relative;animation:fadeIn .15s}
.gallery-item img{width:100%;height:auto;display:block}
.gallery-item .gi-caption{padding:6px 8px;display:flex;gap:4px;align-items:center}
.gallery-item .gi-caption input{font-size:11px;padding:4px 8px;border:none;background:transparent;color:var(--text-2)}
.gallery-item .gi-caption input:focus{background:var(--bg-2)}
.gallery-item .gi-rm{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.7);color:var(--red);border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.gallery-add{background:var(--bg-1);border:1px dashed var(--border);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:120px;transition:all var(--transition);color:var(--text-3);font-size:12px}
.gallery-add:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* ── STEP/FAQ ROWS ───────────────────────────── */
.step-row{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;margin-bottom:6px;display:flex;gap:8px;align-items:flex-start;animation:fadeIn .15s}
.step-inputs{flex:1;display:flex;flex-direction:column;gap:4px}
.step-inputs input:first-child{font-weight:600;font-size:13px}
.step-inputs input:last-child{font-size:12px;color:var(--text-2)}

/* ── EMPTY STATE ─────────────────────────────── */
.empty{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:8px;color:var(--text-3)}
.empty .em-icon{font-size:3rem;opacity:.3}
.empty .em-text{font-size:14px;font-weight:500}

/* ── TOAST ────────────────────────────────────── */
.toast{position:fixed;bottom:16px;right:16px;z-index:999;padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:600;background:var(--bg-2);border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.4);animation:toastIn .25s ease;display:flex;align-items:center;gap:8px}
.toast.success{border-color:var(--green-border)}.toast.error{border-color:var(--red-border)}
@keyframes toastIn{from{transform:translateY(8px) scale(.96);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}

/* ── DEPLOY BANNER ───────────────────────────── */
.deploy-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.deploy-card{background:var(--bg-2);border:1px solid var(--border);border-radius:16px;padding:32px 40px;min-width:380px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.deploy-icon{font-size:40px;margin-bottom:12px}
.deploy-title{font-size:16px;font-weight:800;margin-bottom:6px}
.deploy-sub{font-size:12px;color:var(--text-2);margin-bottom:16px;line-height:1.6}
.deploy-bar{height:4px;background:var(--bg-4);border-radius:2px;overflow:hidden;margin-bottom:12px}
.deploy-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .4s ease;width:0}
.deploy-steps{text-align:left;font-size:11px;color:var(--text-3)}
.deploy-step{padding:4px 0;display:flex;align-items:center;gap:8px}
.deploy-step.done{color:var(--green)}
.deploy-step.active{color:var(--accent)}
.deploy-step .ds-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.deploy-step.done .ds-dot{background:var(--green)}
.deploy-step.active .ds-dot{background:var(--accent);animation:pulse 1s infinite}
.deploy-step.pending .ds-dot{background:var(--bg-4)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.deploy-link{display:inline-block;margin-top:12px;padding:8px 20px;border-radius:var(--r2);background:var(--accent);color:#111;font-weight:700;font-size:13px;text-decoration:none;transition:all var(--transition)}
.deploy-link:hover{opacity:.9;transform:translateY(-1px)}
.deploy-close{margin-top:8px;padding:6px 16px;border:1px solid var(--border);border-radius:var(--r2);background:transparent;color:var(--text-2);cursor:pointer;font-size:12px;font-family:inherit;font-weight:600}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-left">
    <div class="nav-logo"><span class="dot"></span>YAKO_BIZ</div>
    <span class="nav-sep">/</span>
    <span class="nav-page">Product Manager</span>
  </div>
  <div class="nav-right">
    <span class="nav-status" id="status">Loading...</span>
    <button class="btn btn-ghost btn-sm" onclick="reloadData()">Reload</button>
    <button class="btn btn-sm" onclick="saveAll()">Save</button>
    <button class="btn btn-accent btn-sm" onclick="pushWeb()">Deploy</button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-header">
      <span class="sb-title">Products</span>
      <button class="btn btn-sm btn-ghost" onclick="addProduct()">+ Add</button>
    </div>
    <div class="sb-list" id="product-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="empty"><div class="em-icon">📦</div><div class="em-text">Select a product to edit</div></div>
  </div>
</div>

<script>
let products=[], site={}, activeIndex=-1;

async function reloadData(){
  try{
    const r=await fetch('/api/load');const d=await r.json();
    products=d.products||[];site=d.site||{};
    renderSidebar();
    document.getElementById('status').textContent=products.length+' products';
    if(activeIndex>=0&&activeIndex<products.length)selectProduct(activeIndex);
    else document.getElementById('main').innerHTML='<div class="empty"><div class="em-icon">📦</div><div class="em-text">Select a product to edit</div></div>';
  }catch(e){document.getElementById('status').textContent='Error'}
}

async function saveAll(){
  if(activeIndex>=0)saveCurrentForm();saveSiteForm();
  try{
    const r=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({products,site})});
    const d=await r.json();
    if(d.ok)showToast('Saved '+d.count+' products','success');
    else showToast('Error: '+d.error,'error');
  }catch(e){showToast('Connection error','error')}
}

const LIVE_URL='https://yakobiz-web.yakonakswoa.workers.dev';

async function pushWeb(){
  if(activeIndex>=0)saveCurrentForm();saveSiteForm();
  const btn=document.querySelector('.btn-accent');btn.textContent='...';btn.disabled=true;
  showDeployBanner();
  updateDeployStep(0,'active');
  try{
    const r=await fetch('/api/push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({products,site})});
    const d=await r.json();
    if(d.ok){
      updateDeployStep(0,'done');
      updateDeployStep(1,'active');
      updateDeployBar(40);
      // Poll live site
      let deployed=false;
      for(let i=0;i<12;i++){
        await sleep(5000);
        updateDeployBar(40+i*5);
        try{
          const check=await fetch(LIVE_URL+'/products.js?t='+Date.now(),{cache:'no-store'});
          if(check.ok){deployed=true;break;}
        }catch(e){}
      }
      updateDeployStep(1,'done');
      updateDeployStep(2,deployed?'done':'done');
      updateDeployBar(100);
      finishDeploy(deployed,d.count);
      document.getElementById('status').textContent='Live '+new Date().toLocaleTimeString('vi-VN');
    }else{
      updateDeployStep(0,'done');
      failDeploy(JSON.stringify(d.errors||d.error));
    }
  }catch(e){failDeploy(e.message)}
  btn.textContent='Deploy';btn.disabled=false;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function showDeployBanner(){
  let el=document.getElementById('deploy-overlay');
  if(el)el.remove();
  const div=document.createElement('div');
  div.id='deploy-overlay';div.className='deploy-overlay';
  div.innerHTML=`<div class="deploy-card">
    <div class="deploy-icon" id="deploy-icon">🚀</div>
    <div class="deploy-title" id="deploy-title">Deploying...</div>
    <div class="deploy-sub" id="deploy-sub">Pushing to GitHub & waiting for Cloudflare</div>
    <div class="deploy-bar"><div class="deploy-bar-fill" id="deploy-bar"></div></div>
    <div class="deploy-steps">
      <div class="deploy-step pending" id="ds-0"><span class="ds-dot"></span>Push files to GitHub</div>
      <div class="deploy-step pending" id="ds-1"><span class="ds-dot"></span>Cloudflare building & deploying</div>
      <div class="deploy-step pending" id="ds-2"><span class="ds-dot"></span>Site is live</div>
    </div>
    <div id="deploy-actions"></div>
  </div>`;
  document.body.appendChild(div);
}

function updateDeployStep(i,state){
  const el=document.getElementById('ds-'+i);
  if(el){el.className='deploy-step '+state;}
}
function updateDeployBar(pct){
  const el=document.getElementById('deploy-bar');
  if(el)el.style.width=pct+'%';
}
function finishDeploy(ok,count){
  document.getElementById('deploy-icon').textContent='✅';
  document.getElementById('deploy-title').textContent='Deploy Complete!';
  document.getElementById('deploy-sub').innerHTML=`${count} files deployed successfully`;
  document.getElementById('deploy-actions').innerHTML=`<a href="${LIVE_URL}" target="_blank" class="deploy-link">Open Live Site →</a><br><button class="deploy-close" onclick="document.getElementById('deploy-overlay').remove()">Close</button>`;
}
function failDeploy(err){
  document.getElementById('deploy-icon').textContent='❌';
  document.getElementById('deploy-title').textContent='Deploy Failed';
  document.getElementById('deploy-sub').textContent=err;
  document.getElementById('deploy-actions').innerHTML=`<button class="deploy-close" onclick="document.getElementById('deploy-overlay').remove()">Close</button>`;
}

function renderSidebar(){
  const list=document.getElementById('product-list');
  list.innerHTML=products.map((p,i)=>{
    const dotClass=p.status==='active'?'dot-active':p.status==='coming_soon'?'dot-coming':'dot-hidden';
    const statusText=p.status==='active'?'Active':p.status==='coming_soon'?'Coming Soon':'Hidden';
    const imgHtml=p.image?`<img src="${p.image}" onerror="this.parentElement.textContent='${p.icon||'📦'}'">`:p.icon||'📦';
    return`<div class="pi ${i===activeIndex?'active':''}" onclick="selectProduct(${i})">
      <div class="pi-icon">${imgHtml}</div>
      <div class="pi-info"><div class="pi-name">${p.name||p.id}</div><div class="pi-sub"><span class="dot-status ${dotClass}"></span>${statusText} · v${p.version||'?'}</div></div>
    </div>`;
  }).join('');
}

function selectProduct(i){
  if(activeIndex>=0&&activeIndex!==i)saveCurrentForm();
  activeIndex=i;renderSidebar();renderEditor(products[i]);
}

function deleteProduct(i){if(!confirm('Delete '+products[i].name+'?'))return;products.splice(i,1);activeIndex=-1;renderSidebar();document.getElementById('main').innerHTML='<div class="empty"><div class="em-icon">🗑</div><div class="em-text">Deleted</div></div>';}

function addProduct(){
  const id=prompt('Product ID (lowercase, no spaces):');if(!id)return;
  if(products.find(p=>p.id===id)){alert('ID exists!');return;}
  products.push({id,name:id,tagline:'',icon:'📦',status:'coming_soon',category:'other',features:[],plans:[],guide:{}});
  activeIndex=products.length-1;renderSidebar();renderEditor(products[activeIndex]);
}

function toggleStatus(){
  if(activeIndex<0)return;
  const s=products[activeIndex].status;
  products[activeIndex].status=s==='active'?'coming_soon':s==='coming_soon'?'hidden':'active';
  renderSidebar();renderEditor(products[activeIndex]);
}

function renderEditor(p){
  const g=p.guide||{};
  const badgeClass=p.status==='active'?'badge-active':p.status==='coming_soon'?'badge-coming':'badge-hidden';
  const badgeText=p.status==='active'?'Active':p.status==='coming_soon'?'Coming Soon':'Hidden';
  document.getElementById('main').innerHTML=`
    <div class="section-head">
      <div><h2>${p.icon||''} ${p.name||p.id}</h2><div class="meta">${p.tagline||'No tagline'}</div></div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="badge ${badgeClass}" style="cursor:pointer" onclick="toggleStatus()">${badgeText} ↻</span>
        <button class="btn btn-red btn-sm" onclick="deleteProduct(${activeIndex})">Delete</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('basic',this)">General</div>
      <div class="tab" onclick="switchTab('features',this)">Features & Pricing</div>
      <div class="tab" onclick="switchTab('guide',this)">Guide</div>
      <div class="tab" onclick="switchTab('site',this)">Settings</div>
    </div>

    <!-- BASIC -->
    <div class="tab-content active" id="tab-basic">
      <div class="card"><div class="card-title"><span class="ct-icon">📋</span>Product Info</div>
        <div class="form-grid">
          <div class="fg"><label>ID</label><input id="f-id" value="${esc(p.id)}"></div>
          <div class="fg"><label>Icon</label><input id="f-icon" value="${esc(p.icon)}" placeholder="📦"></div>
          <div class="fg form-full"><label>Name</label><input id="f-name" value="${esc(p.name)}"></div>
          <div class="fg form-full"><label>Tagline</label><input id="f-tagline" value="${esc(p.tagline)}"></div>
          <div class="fg form-full"><label>Description</label><textarea id="f-desc">${esc(p.description||'')}</textarea></div>
          <div class="fg"><label>Category</label><select id="f-cat"><option value="tiktok" ${p.category==='tiktok'?'selected':''}>TikTok</option><option value="other" ${p.category==='other'?'selected':''}>Other</option></select></div>
          <div class="fg"><label>Status</label><select id="f-status"><option value="active" ${p.status==='active'?'selected':''}>Active</option><option value="coming_soon" ${p.status==='coming_soon'?'selected':''}>Coming Soon</option><option value="hidden" ${p.status==='hidden'?'selected':''}>Hidden</option></select></div>
          <div class="fg"><label>Badge Text</label><input id="f-badge" value="${esc(p.badge||'')}" placeholder="HOT, NEW..."></div>
          <div class="fg"><label>Badge Color</label><input id="f-badge-color" type="color" value="${p.badgeColor||'#6c63ff'}" style="height:34px;padding:2px 4px"></div>
          <div class="fg form-full"><label>Download URL</label><input id="f-url" value="${esc(p.downloadUrl||'')}"></div>
          <div class="fg"><label>Version</label><input id="f-version" value="${esc(p.version||'')}"></div>
          <div class="fg"><label>File Size</label><input id="f-size" value="${esc(p.fileSize||'')}"></div>
          <div class="fg"><label>Platform</label><input id="f-platform" value="${esc(p.platform||'')}"></div>
        </div>
      </div>
      <div class="card"><div class="card-title"><span class="ct-icon">🖼</span>Product Image</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start">
          <div class="img-zone" id="img-preview" onclick="document.getElementById('img-file').click()">
            ${p.image?`<img src="${p.image}" onerror="this.remove()"><button class="img-rm" onclick="event.stopPropagation();removeImage()">✕</button>`:'<div class="ph"><span class="up-icon">↑</span>Click to upload<br>16:9 recommended</div>'}
          </div>
          <input type="file" id="img-file" accept="image/*" style="display:none" onchange="uploadImage(this)">
          <div style="flex:1;min-width:180px"><div class="fg"><label>Image Path</label><input id="f-image" value="${esc(p.image||'')}" placeholder="images/product.jpg" oninput="previewImagePath(this.value)"></div></div>
        </div>
      </div>
    </div>

    <!-- FEATURES -->
    <div class="tab-content" id="tab-features">
      <div class="card"><div class="card-title"><span class="ct-icon">✅</span>Features</div>
        <div id="features-list">${(p.features||[]).map(f=>`<div class="dyn-row"><input value="${esc(f)}"><button class="rm-btn" onclick="this.parentElement.remove()">✕</button></div>`).join('')}</div>
        <button class="add-btn" onclick="addRow('features-list','')">+ Add Feature</button>
      </div>
      <div class="card"><div class="card-title"><span class="ct-icon">💰</span>Pricing Plans</div>
        <div style="display:grid;grid-template-columns:2fr 1.2fr 1.5fr 26px;gap:4px;font-size:10px;color:var(--text-3);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.05em"><span>Plan Name</span><span>Price (VND)</span><span>Note</span><span></span></div>
        <div id="plans-list">${(p.plans||[]).map(pl=>`<div class="dyn-row"><input value="${esc(pl.name)}" style="flex:2"><input type="number" value="${pl.price||''}" style="flex:1.2"><input value="${esc(pl.save||'')}" placeholder="Discount note" style="flex:1.5"><button class="rm-btn" onclick="this.parentElement.remove()">✕</button></div>`).join('')}</div>
        <button class="add-btn" onclick="addPlanRow()">+ Add Plan</button>
      </div>
    </div>

    <!-- GUIDE -->
    <div class="tab-content" id="tab-guide">
      <div class="card"><div class="card-title"><span class="ct-icon">🎬</span>Guide Page</div>
        <div class="form-grid">
          <div class="fg form-full"><label>YouTube Video ID</label><input id="g-video" value="${esc(g.videoId||'')}"></div>
          <div class="fg form-full"><label>Description</label><textarea id="g-desc">${esc(g.desc||'')}</textarea></div>
        </div>
      </div>
      <div class="card"><div class="card-title"><span class="ct-icon">🖼</span>Guide Images</div>
        <div class="gallery-grid" id="guide-images">
          ${(g.images||[]).map((img,idx)=>`<div class="gallery-item"><img src="${img.src}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 320 200%22><rect fill=%22%2316161a%22 width=%22320%22 height=%22200%22/><text x=%2250%25%22 y=%2250%25%22 fill=%22%2371717a%22 text-anchor=%22middle%22 dy=%22.3em%22 font-family=%22sans-serif%22>No image</text></svg>'"><div class="gi-caption"><input value="${esc(img.caption||'')}" placeholder="Caption..."><button class="gi-rm" onclick="this.closest('.gallery-item').remove()">✕</button></div></div>`).join('')}
          <div class="gallery-add" onclick="addGuideImage()">+ Add Image</div>
        </div>
        <input type="file" id="guide-img-file" accept="image/*" style="display:none" onchange="uploadGuideImage(this)">
      </div>
      <div class="card"><div class="card-title"><span class="ct-icon">📋</span>Steps</div>
        <div id="steps-list">${(g.steps||[]).map(s=>`<div class="step-row"><div class="step-inputs"><input value="${esc(s.title)}"><input value="${esc(s.desc)}"></div><button class="rm-btn" onclick="this.parentElement.remove()">✕</button></div>`).join('')}</div>
        <button class="add-btn" onclick="addStepRow()">+ Add Step</button>
      </div>
      <div class="card"><div class="card-title"><span class="ct-icon">❓</span>FAQ</div>
        <div id="faq-list">${(g.faq||[]).map(f=>`<div class="step-row"><div class="step-inputs"><input value="${esc(f.q)}" placeholder="Question"><input value="${esc(f.a)}" placeholder="Answer"></div><button class="rm-btn" onclick="this.parentElement.remove()">✕</button></div>`).join('')}</div>
        <button class="add-btn" onclick="addFaqRow()">+ Add FAQ</button>
      </div>
    </div>

    <!-- SITE -->
    <div class="tab-content" id="tab-site">
      <div class="card"><div class="card-title"><span class="ct-icon">⚙️</span>Site Configuration</div>
        <div class="form-grid">
          ${[['Brand','brand'],['Slogan','slogan'],['Zalo','zalo'],['Zalo URL','zalo_url'],['Phone','phone'],['Email','email'],['Facebook','facebook'],['Telegram','telegram'],['Telegram URL','telegram_url'],['Bank ID','bank_id'],['Bank Name','bank_name'],['Account Number','bank_number'],['Account Owner','bank_owner']].map(([l,k])=>`<div class="fg"><label>${l}</label><input id="s-${k}" value="${esc(site[k]||'')}"></div>`).join('')}
        </div>
      </div>
    </div>`;
}

function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function switchTab(name,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('tab-'+name).classList.add('active');}
function addRow(id,v){const l=document.getElementById(id);const r=document.createElement('div');r.className='dyn-row';r.innerHTML=`<input value="${esc(v)}" placeholder="Feature..."><button class="rm-btn" onclick="this.parentElement.remove()">✕</button>`;l.appendChild(r);}
function addPlanRow(n='',p='',s=''){const l=document.getElementById('plans-list');const r=document.createElement('div');r.className='dyn-row';r.innerHTML=`<input value="${esc(n)}" placeholder="Plan name" style="flex:2"><input type="number" value="${p}" placeholder="Price" style="flex:1.2"><input value="${esc(s)}" placeholder="Note" style="flex:1.5"><button class="rm-btn" onclick="this.parentElement.remove()">✕</button>`;l.appendChild(r);}
function addStepRow(t='',d=''){const l=document.getElementById('steps-list');const r=document.createElement('div');r.className='step-row';r.innerHTML=`<div class="step-inputs"><input value="${esc(t)}" placeholder="Step title"><input value="${esc(d)}" placeholder="Step description"></div><button class="rm-btn" onclick="this.parentElement.remove()">✕</button>`;l.appendChild(r);}
function addFaqRow(q='',a=''){const l=document.getElementById('faq-list');const r=document.createElement('div');r.className='step-row';r.innerHTML=`<div class="step-inputs"><input value="${esc(q)}" placeholder="Question"><input value="${esc(a)}" placeholder="Answer"></div><button class="rm-btn" onclick="this.parentElement.remove()">✕</button>`;l.appendChild(r);}
function removeImage(){document.getElementById('f-image').value='';document.getElementById('img-preview').innerHTML='<div class="ph"><span class="up-icon">↑</span>Click to upload</div>';}
function addGuideImage(){document.getElementById('guide-img-file').click();}
async function uploadGuideImage(input){
  const file=input.files[0];if(!file)return;
  const pid=document.getElementById('f-id')?.value||'product';
  const ts=Date.now();
  const form=new FormData();form.append('file',file);form.append('product_id',pid+'-guide-'+ts);
  try{
    const r=await fetch('/api/upload-image',{method:'POST',body:form});const d=await r.json();
    if(d.ok){
      const grid=document.getElementById('guide-images');
      const addBtn=grid.querySelector('.gallery-add');
      const item=document.createElement('div');item.className='gallery-item';
      item.innerHTML=`<img src="${d.path}"><div class="gi-caption"><input value="" placeholder="Caption..."><button class="gi-rm" onclick="this.closest('.gallery-item').remove()">✕</button></div>`;
      grid.insertBefore(item,addBtn);
      showToast('Image added','success');
    }
  }catch(e){showToast('Upload error','error')}
  input.value='';
}
function previewImagePath(p){const el=document.getElementById('img-preview');if(p)el.innerHTML=`<img src="${p}" onerror="this.parentElement.innerHTML='<div class=ph>Invalid path</div>'"><button class="img-rm" onclick="event.stopPropagation();removeImage()">✕</button>`;}
async function uploadImage(input){const file=input.files[0];if(!file)return;const pid=document.getElementById('f-id')?.value||'product';const form=new FormData();form.append('file',file);form.append('product_id',pid);try{const r=await fetch('/api/upload-image',{method:'POST',body:form});const d=await r.json();if(d.ok){document.getElementById('f-image').value=d.path;previewImagePath(d.path);showToast('Image saved: '+d.path,'success');}}catch(e){showToast('Upload error','error')}input.value='';}

function saveCurrentForm(){
  if(activeIndex<0)return;const p=products[activeIndex];
  const v=id=>(document.getElementById(id)?.value||'').trim();
  p.id=v('f-id');p.name=v('f-name');p.tagline=v('f-tagline');p.description=v('f-desc')||null;p.icon=v('f-icon')||'📦';
  p.badge=v('f-badge')||null;p.badgeColor=v('f-badge-color')||'#6c63ff';p.category=v('f-cat');p.status=v('f-status');
  p.downloadUrl=v('f-url')||null;p.image=v('f-image')||null;p.version=v('f-version')||null;p.fileSize=v('f-size')||null;p.platform=v('f-platform')||null;
  p.features=[...document.querySelectorAll('#features-list .dyn-row input')].map(i=>i.value.trim()).filter(Boolean);
  p.plans=[...document.querySelectorAll('#plans-list .dyn-row')].map(row=>{const inputs=row.querySelectorAll('input');const plan={name:inputs[0].value.trim(),price:parseInt(inputs[1].value)||0};if(inputs[2]?.value.trim())plan.save=inputs[2].value.trim();return plan;}).filter(pl=>pl.name);
  const guideImages=[...document.querySelectorAll('#guide-images .gallery-item')].map(el=>{const img=el.querySelector('img');const cap=el.querySelector('input');return{src:img?.src?.replace(location.origin+'/','')?.replace(location.origin,''),caption:cap?.value?.trim()||''};}).filter(x=>x.src&&!x.src.startsWith('data:'));
  p.guide={videoId:v('g-video'),desc:v('g-desc'),images:guideImages,steps:[...document.querySelectorAll('#steps-list .step-row')].map(r=>{const i=r.querySelectorAll('input');return{title:i[0].value.trim(),desc:i[1].value.trim()};}).filter(s=>s.title),faq:[...document.querySelectorAll('#faq-list .step-row')].map(r=>{const i=r.querySelectorAll('input');return{q:i[0].value.trim(),a:i[1].value.trim()};}).filter(f=>f.q)};
  renderSidebar();
}
function saveSiteForm(){['brand','slogan','zalo','zalo_url','phone','email','facebook','telegram','telegram_url','bank_id','bank_name','bank_number','bank_owner'].forEach(k=>{const el=document.getElementById('s-'+k);if(el)site[k]=el.value.trim();});}
function showToast(msg,type){const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
window.addEventListener('beforeunload',()=>{if(activeIndex>=0)saveCurrentForm();});
reloadData();
</script>
</body>
</html>
